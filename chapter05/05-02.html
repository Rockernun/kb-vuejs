<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      금액: <input type="text" v-model.number="amount" />
      <button @click="deposit += parseInt(amount)">입금</button>
      <button @click="deposit -= parseInt(amount)">출금</button>
      <br />
      <h3>계좌 잔고: {{deposit}}</h3>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let viewModel = Vue.createApp({
        name: "App",
        data() {
          return {
            amount: 0,
            deposit: 0,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
